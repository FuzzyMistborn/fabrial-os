---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fabrial-os
description: Personal Aurora (KDE) desktop image (basic)

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:

  # ── 1. SYSTEM FILES ────────────────────────────────────────────────────────
  - from-file: base/files.yml

  # ── 2. RPM PACKAGES ────────────────────────────────────────────────────────
  - from-file: base/packages.yml

  # ── 3. SYSTEMD SERVICES ────────────────────────────────────────────────────
  - from-file: base/services.yml

  # ── 4. JUSTFILES ───────────────────────────────────────────────────────────
  - from-file: base/justfiles.yml

  # ── 5. CHEZMOI ─────────────────────────────────────────────────────────────
  - from-file: base/chezmoi.yml

  # ── 6. FLATPAKS ────────────────────────────────────────────────────────────
  - from-file: system-flatpaks.yml
  - from-file: media-flatpaks.yml
  - from-file: base/flatpaks.yml

  # ── 7. SIGNING ─────────────────────────────────────────────────────────────
  - type: signing
