---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fabrial-os-framework
description: Personal Aurora (KDE) desktop image (with Framework kernel)

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:

  # ── 1. SYSTEM FILES ────────────────────────────────────────────────────────
  - type: files
    files:
      - source: hoid
        destination: /
  
  - from-file: base/files.yml

  # ── 2. RPM PACKAGES ────────────────────────────────────────────────────────
  - from-file: base/packages.yml
  - type: dnf
    install:
      skip-unavailable: true
      packages:
        - gtk2
        - skanlite
        - skanpage
        - brlaser
  - type: script
    scripts:
      - install-brscan5.sh

  # ── 3. SYSTEMD SERVICES ────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - logid.service
        - restic_backup.timer
        - restic_prune.timer
        - remove-unwanted-flatpaks.service

  - from-file: base/services.yml

  # ── 4. JUSTFILES ───────────────────────────────────────────────────────────
  - type: justfiles
    include:
      - 60-hoid.just
  
  - from-file: base/justfiles.yml

  # ── 5. CHEZMOI ─────────────────────────────────────────────────────────────
  - from-file: base/chezmoi.yml

  # ── 6. FLATPAKS ────────────────────────────────────────────────────────────
  - from-file: system-flatpaks.yml
  - from-file: media-flatpaks.yml
  - from-file: base/flatpaks.yml

  # ── 7. SIGNING ─────────────────────────────────────────────────────────────
  - type: signing