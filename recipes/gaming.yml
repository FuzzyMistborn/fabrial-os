---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fabrial-os-gaming
description: Personal Bazzite gaming desktop image

base-image: ghcr.io/ublue-os/bazzite
image-version: stable

modules:

  # ── 1. SYSTEM FILES ────────────────────────────────────────────────────────
  - type: files
    files:
      - source: system
        destination: /

  # ── 2. RPM PACKAGES ────────────────────────────────────────────────────────
  - type: dnf
    install:
      # skip-unavailable prevents hard failures for packages already in Aurora's
      # base image or unavailable on this Fedora version.
      skip-unavailable: true
      packages:
        - nextcloud-client
        - https://github.com/joshuar/go-hass-agent/releases/download/v14.10.5/go-hass-agent-14.10.5-1.x86_64.rpm

  # ── 3. JUSTFILES ───────────────────────────────────────────────────────────
  - type: justfiles
    include:
      - 50-common.just
      - 60-kelsier.just

  # ── 4. CHEZMOI ─────────────────────────────────────────────────────────────
  - type: chezmoi
    repository: "git@git.fuzzymistborn.com:FuzzyMistborn/dotfiles.git"
    disable-init: true
    all-users: false
    run-every: '12h'

  # ── 5. FLATPAKS ────────────────────────────────────────────────────────────
  - from-file: system-flatpaks.yml
  - from-file: media-flatpaks.yml

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - com.discordapp.Discord
  
  # ── 6. SIGNING ─────────────────────────────────────────────────────────────
  - type: signing
