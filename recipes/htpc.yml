---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fabrial-os-htpc
description: Personal Bazzite HTPC image 

base-image: ghcr.io/ublue-os/bazzite-deck
image-version: stable

modules:

  # ── 1. SYSTEM FILES ────────────────────────────────────────────────────────
  - type: files
    files:
      - source: system
        destination: /

  # ── 2. RPM PACKAGES ────────────────────────────────────────────────────────
  - type: dnf
    install:
      # skip-unavailable prevents hard failures for packages already in Aurora's
      # base image or unavailable on this Fedora version.
      skip-unavailable: true
      packages:
        - https://github.com/joshuar/go-hass-agent/releases/download/v14.10.5/go-hass-agent-14.10.5-1.x86_64.rpm


  # ── 3. FLATPAKS ────────────────────────────────────────────────────────────
  - from-file: common-flatpaks.yml

  # ── 4. SIGNING ─────────────────────────────────────────────────────────────
  - type: signing
