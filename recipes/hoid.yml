---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: fabrial-os
description: Personal Aurora (KDE) desktop image for Hoid

base-image: ghcr.io/ublue-os/aurora
image-version: stable

modules:

  # ── 1. SYSTEM FILES ────────────────────────────────────────────────────────
  - type: files
    files:
      - source: system
        destination: /

  # ── 2. RPM PACKAGES ────────────────────────────────────────────────────────
  - type: dnf
    repos:
      files:
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
      cleanup: true

    install:
      # skip-unavailable prevents hard failures for packages already in Aurora's
      # base image or unavailable on this Fedora version.
      skip-unavailable: true
      packages:
        # ── Productivity / Office ──
        - calibre
        - thunderbird
        - nextcloud-client

        # ── Developer tools ──
        - code               # from VS Code repo above
        - python3-devel
        - pipx

        # ── Network / Remote ──
        - iperf3

        # ── Multimedia ──
        - mpv
        - mpv-mpris

        # ── System utilities ──
        - ncdu
        - screen
        - hddtemp
        - ulauncher

        # ── Hardware / Input ──
        - logiops
        - solaar

    remove:
      packages:
        # KDE PIM / groupware bloat — Aurora already removed most of these,
        # skip-unavailable handles any that are already gone.
        - akregator
        - akonadi-import-wizard
        - dragon
        - elisa-player
        - grantlee-editor
        - kamoso
        - kaddressbook
        - khelpcenter
        - kmahjongg
        - kmail
        - kmail-account-wizard
        - kmines
        - kmouth
        - haruna
        - kontact
        - kontactinterface
        - korganizer
        - kpat
        - pim-data-exporter
        - pim-sieve-editor
        - plasma-welcome
        - neochat

  # ── 3. SYSTEMD SERVICES ────────────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - tailscaled.service
        - logid.service
        - sshd.service
        - restic_backup.timer
        - restic_prune.timer
        - remove-unwanted-flatpaks.service

  # ── 4. JUSTFILES ───────────────────────────────────────────────────────────
  - type: justfiles
    include:
      - 60-hoid.just

  # ── 5. FLATPAKS ────────────────────────────────────────────────────────────
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.libreoffice.LibreOffice
          - org.gimp.GIMP
          - com.github.PintaProject.Pinta
          - org.audacityteam.Audacity
          - org.bunkus.mkvtoolnix-gui
          - com.github.jeromerobert.pdfarranger
          - org.flameshot.Flameshot
          - org.kde.krename
          - org.kde.skanlite
          - org.kde.skanpage
          - org.videolan.VLC
          - org.remmina.Remmina
          - us.zoom.Zoom
          - org.signal.Signal
          - org.ferdium.Ferdium
          - md.obsidian.Obsidian
          - com.jgraph.drawio.desktop
          - io.github.dweymouth.supersonic
          - org.bunkus.mkvtoolnix-gui
          - com.github.wwmm.easyeffects
          - io.github.lullabyX.sone
          - com.mojang.Minecraft
          - com.bambulab.BambuStudio
          - com.moonlight_stream.Moonlight
          - com.system76.Popsicle
          - org.raspberrypi.rpi-imager
          - org.localsend.localsend_app
          - io.gitlab.adhami3310.Converter
          - io.github.Omniaevo.mqtt5-explorer
          - com.bitwarden.desktop
          - com.obsproject.Studio
          - com.vysp3r.ProtonPlus
          - org.gnome.Calculator
          - org.openscad.OpenSCAD
          - org.filezillaproject.Filezilla
          - org.chromium.Chromium
          - org.kde.kid3
          - com.valvesoftware.Steam
      - scope: user
        install: []

  # ── 6. SIGNING ─────────────────────────────────────────────────────────────
  - type: signing
